# Hatchery service — the single long-running container that performs spawns.
#
#   # 1. observability stack first (creates the `march` network):
#   docker compose -f docker/otel-lgtm.docker-compose.yml up -d
#   # 2. Castra (the interactive-sessions host the Hatchery drives over HTTP):
#   export CASTRA_API_TOKEN=$(openssl rand -hex 32)   # share this with hatchery
#   docker compose -f docker/castra.docker-compose.yml up -d
#   # 3. build + run hatchery (from the repo root), reusing the same token:
#   npm run build:hatchery-image
#   docker compose -f docker/hatchery.docker-compose.yml up -d
#
# The `march hatchery spawn` CLI on the host is a thin client; point it here:
#   export MARCH_HATCHERY_URL=http://localhost:8080
#
# Interactive sessions (agent-deck) are NOT mounted here anymore: the Hatchery
# launches/sends/removes stewards through the Castra HTTP API. Start Castra
# first and pass the SAME CASTRA_API_TOKEN to both services.
#
# HOST-SPECIFIC CONFIG (override via env or a .env file next to this compose):
#   MARCH_HOST_HOME   host HOME, bind-mounted at the IDENTICAL path so repos,
#                     worktrees, ~/.codex and ~/.march resolve to the same
#                     absolute paths inside the container (required — git apply
#                     and the build context target the worktree path Castra
#                     created on the shared host HOME).
#   MARCH_HOST_UID    host uid that owns those files + the docker socket (run-as).
#   MARCH_HOST_GID    host primary gid for those files (defaults to the uid; set
#                     it explicitly when your primary group id differs from uid).
#   MARCH_DOCKER_GID  gid of the host `docker` group (for /var/run/docker.sock).
#   CASTRA_URL        base URL of the Castra service (default: http://castra:9264
#                     on the shared `march` network).
#   CASTRA_PORT       Castra API port (default: the deterministic 9264).
#   CASTRA_API_TOKEN  bearer token for Castra's /v1/* — REQUIRED, must match the
#                     value Castra was started with.
#
# SECURITY: this mounts the docker socket (host-root-equivalent) and your HOME.
# The port is bound to localhost only; never expose it publicly, never publish
# this image.
name: march-hatchery

services:
  hatchery:
    build:
      context: ..
      dockerfile: docker/hatchery.Dockerfile
    image: march-hatchery:latest
    container_name: march-hatchery
    restart: on-failure
    command: ["hatchery", "serve"]
    # Run as the host user so mounted files / sockets are accessible, plus the
    # docker group so the daemon socket is usable.
    user: "${MARCH_HOST_UID:-1000}:${MARCH_HOST_GID:-${MARCH_HOST_UID:-1000}}"
    group_add:
      - "${MARCH_DOCKER_GID:-1001}"
    ports:
      - "127.0.0.1:8080:8080" # localhost only — never public
    environment:
      - MARCH_OTEL=1
      - MARCH_OTEL_ENDPOINT=http://otel-lgtm:4318
      - MARCH_OTEL_SERVICE_NAME=march-hatchery
      - MARCH_HATCHERY_PORT=8080
      - MARCH_HATCHERY_LOG_DIR=/march/logs
      # os.homedir() resolves from HOME -> spawn records/artifacts land on the
      # mounted host HOME at the identical path.
      - HOME=${MARCH_HOST_HOME:-/home/jmbattista}
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - CODEX_HOME=${MARCH_HOST_HOME:-/home/jmbattista}/.codex
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Castra — the interactive-sessions host the Hatchery drives over HTTP.
      - CASTRA_URL=${CASTRA_URL:-http://castra:${CASTRA_PORT:-9264}}
      # Required — must match the token Castra was started with.
      - CASTRA_API_TOKEN=${CASTRA_API_TOKEN:?CASTRA_API_TOKEN must be set and match the Castra service}
    volumes:
      # Host docker daemon (spawn containers run as siblings on it).
      - /var/run/docker.sock:/var/run/docker.sock
      # Whole HOME at the identical path: repos, worktrees (created by Castra),
      # ~/.codex, ~/.march. git apply + the spawn build context operate on the
      # worktree path Castra returns, so it must resolve identically here.
      - ${MARCH_HOST_HOME:-/home/jmbattista}:${MARCH_HOST_HOME:-/home/jmbattista}
      # Durable service log file (also shipped to otel-lgtm via OTLP logs).
      - march-hatchery-logs:/march/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - march

networks:
  march:
    external: true
    name: march

volumes:
  march-hatchery-logs:
