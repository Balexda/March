# Legate service — the profile-agnostic deterministic loop. ONE container drives
# EVERY registered profile (profiles come from Herald's registry, refreshed each
# tick), so it stands up + auto-restarts exactly like brood/herald/castra rather
# than being a per-profile container that must be re-launched per repo.
#
#   # 1. observability stack first (creates the `march` network):
#   docker compose -f docker/otel-lgtm.docker-compose.yml up -d
#   # 2. castra + hatchery + brood + herald (see their compose files), then:
#   npm run build:legate-image
#   docker compose -f docker/legate.docker-compose.yml up -d
#
# Onboard a repo with `march legate init <repo>` — it registers the profile with
# Herald and the running container picks it up on its next tick (no restart).
#
# HOST-SPECIFIC CONFIG (override via env or a .env file next to this compose):
#   MARCH_HOST_HOME   host HOME, bind-mounted at the IDENTICAL path so EVERY
#                     profile's repo + WorkTrees, ~/.march/legate (per-profile
#                     action logs + the single Herald cursor) and the gh/git/ssh
#                     credentials resolve to the same absolute paths inside the
#                     container. A newly-registered profile whose repo lives under
#                     HOME is reachable live; a repo outside HOME needs the mount
#                     extended + a restart.
#   MARCH_HOST_UID    host uid that owns those files (run-as).
#   MARCH_HOST_GID    host primary gid for those files (defaults to the uid).
#   CASTRA_URL        castra base URL (sessions/output/send).
#   CASTRA_API_TOKEN  bearer token — must match the castra service's token.
#   MARCH_HERALD_URL  herald base URL (profile registry + event inbox/write).
#   MARCH_BROOD_URL   brood base URL (teardown requests).
#   MARCH_HATCHERY_URL hatchery base URL (spawn requests).
#
# SECURITY: this mounts your HOME (repos, worktrees, creds). It does NOT mount the
# docker socket — the legate asks Castra/Brood/Hatchery to act over HTTP, it never
# shells docker. The port is bound to localhost only; never expose it publicly,
# never publish this image.
name: march-legate

services:
  legate:
    build:
      context: ..
      dockerfile: docker/legate.Dockerfile
    image: march-legate:latest
    container_name: march-legate
    restart: unless-stopped
    command: ["legate", "serve"]
    # Run as the host user so mounted files / creds are accessible.
    user: "${MARCH_HOST_UID:-1000}:${MARCH_HOST_GID:-${MARCH_HOST_UID:-1000}}"
    ports:
      - "127.0.0.1:8787:8787" # localhost only — never public (legate HTTP API)
    environment:
      - MARCH_OTEL=1
      - MARCH_OTEL_ENDPOINT=http://otel-lgtm:4318
      - MARCH_OTEL_SERVICE_NAME=march-legate
      - MARCH_LEGATE_PORT=8787
      # GLOBAL cap on concurrent live spawns (#313), shared across ALL profiles on
      # this single legate container. Unset / non-numeric / <= 0 falls back to 10.
      - MARCH_MAX_CONCURRENT_SPAWNS=${MARCH_MAX_CONCURRENT_SPAWNS:-10}
      # Bind 0.0.0.0 inside the container so the loopback port-publish can reach it.
      - MARCH_LEGATE_CONTAINER=1
      # os.homedir() resolves from HOME -> ~/.march/legate (per-profile logs + the
      # single Herald cursor) and the repo/worktree paths land on the mounted HOME.
      - HOME=${MARCH_HOST_HOME:-/home/jmbattista}
      # Service endpoints over the shared `march` network (defaults match the
      # deterministic ports the other compose files publish).
      - MARCH_HERALD_URL=${MARCH_HERALD_URL:-http://herald:8818}
      - MARCH_BROOD_URL=${MARCH_BROOD_URL:-http://brood:9748}
      - MARCH_HATCHERY_URL=${MARCH_HATCHERY_URL:-http://hatchery:8080}
      - CASTRA_URL=${CASTRA_URL:-http://castra:${CASTRA_PORT:-9264}}
      - CASTRA_API_TOKEN=${CASTRA_API_TOKEN:?CASTRA_API_TOKEN must match the castra service token}
      # GitHub auth for gh/git (read PR/branch state, push). Forwarded if set.
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      # Whole HOME at the identical path: every profile's repos + WorkTrees,
      # ~/.march/legate (per-profile action logs + the Herald cursor), and
      # ~/.config/gh, .gitconfig, .ssh for gh/git. No docker socket.
      - ${MARCH_HOST_HOME:-/home/jmbattista}:${MARCH_HOST_HOME:-/home/jmbattista}
      # Durable service log file (also shipped to otel-lgtm via OTLP logs).
      - march-legate-logs:/march/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - march

networks:
  march:
    external: true
    name: march

volumes:
  march-legate-logs:
